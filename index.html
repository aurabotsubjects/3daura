<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AURA Robot — Mac Fixed & Faster Movement</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#F4E8D6; }
  #hint {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size:13px; color:#171717; background:rgba(255,255,255,0.7);
    padding:6px 14px; border-radius:999px; letter-spacing:0.02em; pointer-events:none;
    backdrop-filter: blur(4px); text-transform: uppercase; font-weight: 800;
    border: 2px solid #000;
  }
  canvas { display:block; }
</style>
</head>
<body>
<div id="hint">ARROW KEYS to move & turn · drag to orbit · scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // Punchy, vibrant colors from the 2D illustration
  const COLORS = {
    bg:        0xF4E8D6,
    orange:    0xFF5E13, 
    orangeDk:  0xDF3C00,
    screen:    0x0B0C10,
    cyan:      0x2EE2FA,
    grey:      0x33353D,
    greyLt:    0x4A4D57,
    purple:    0x78288C,
    heart:     0xFF5A5F,
    outline:   0x000000
  };

  // ---------- renderer / scene / camera ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(COLORS.bg);
  scene.fog = new THREE.Fog(COLORS.bg, 40, 100); 

  const camera = new THREE.PerspectiveCamera(38, window.innerWidth/window.innerHeight, 0.1, 200);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.appendChild(renderer.domElement);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- lighting ----------
  const hemi = new THREE.HemisphereLight(0xffffff, 0x888888, 0.95);
  scene.add(hemi);

  const lightsGroup = new THREE.Group();
  scene.add(lightsGroup);

  const key = new THREE.DirectionalLight(0xffffff, 0.8);
  key.position.set(5, 12, 7);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.left = -12; key.shadow.camera.right = 12;
  key.shadow.camera.top = 12; key.shadow.camera.bottom = -12;
  key.shadow.bias = -0.0015;
  lightsGroup.add(key);
  lightsGroup.add(key.target);

  const fill = new THREE.DirectionalLight(0xffeedd, 0.4);
  fill.position.set(-6, 4, -4);
  lightsGroup.add(fill);

  // ---------- BLACK OUTLINE SHADER (Inverted Hull) ----------
  // Explicit precision precision highp float added for Mac/Safari GLSL compatibility
  const outlineMaterial = new THREE.ShaderMaterial({
    uniforms: {
      outlineColor: { value: new THREE.Color(COLORS.outline) },
      outlineThickness: { value: 0.05 }
    },
    vertexShader: `
      precision highp float;
      uniform float outlineThickness;
      void main() {
        vec3 pos = position + normal * outlineThickness;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform vec3 outlineColor;
      void main() {
        gl_FragColor = vec4(outlineColor, 1.0);
      }
    `,
    side: THREE.BackSide
  });

  function addOutline(mesh, thickness = 0.05) {
    if (!mesh || !mesh.geometry) return;
    const outline = new THREE.Mesh(mesh.geometry, outlineMaterial.clone());
    outline.material.uniforms.outlineThickness.value = thickness;
    mesh.add(outline);
  }

  // ---------- endless ground & autogenerating rocks ----------
  const groundGeo = new THREE.PlaneGeometry(2000, 2000);
  const groundMat = new THREE.MeshStandardMaterial({ color: COLORS.bg, roughness: 1.0 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -4.65; 
  ground.receiveShadow = true;
  scene.add(ground);

  const rockMat = new THREE.MeshStandardMaterial({ color: 0xD6C4AF, roughness: 1.0, flatShading: true });
  const rocksGroup = new THREE.Group();
  scene.add(rocksGroup);

  for (let i = 0; i < 40; i++) {
    const radius = 0.3 + Math.random() * 0.7;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(radius, 0), rockMat);

    const angle = Math.random() * Math.PI * 2;
    const distance = 5 + Math.random() * 40; 
    rock.position.x = Math.cos(angle) * distance;
    rock.position.z = Math.sin(angle) * distance;
    rock.position.y = -4.65 + (radius * 0.2); 
    rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    rock.scale.set(1, 0.6 + Math.random() * 0.5, 1 + Math.random() * 0.4);

    rock.castShadow = true; rock.receiveShadow = true;
    addOutline(rock, 0.04);
    rocksGroup.add(rock);
  }

  // ---------- geometry/material helpers ----------
  function roundedRectShape(w, h, r){
    const shape = new THREE.Shape();
    const x = -w/2, y = -h/2;
    shape.moveTo(x, y+r); shape.lineTo(x, y+h-r);
    shape.quadraticCurveTo(x, y+h, x+r, y+h); shape.lineTo(x+w-r, y+h);
    shape.quadraticCurveTo(x+w, y+h, x+w, y+h-r); shape.lineTo(x+w, y+r);
    shape.quadraticCurveTo(x+w, y, x+w-r, y); shape.lineTo(x+r, y);
    shape.quadraticCurveTo(x, y, x, y+r); return shape;
  }
  function roundedBoxGeometry(w, h, d, r){
    const shape = roundedRectShape(w, h, r);
    const bevel = Math.min(0.08, d*0.12, r*0.6);
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: d - bevel*2, bevelEnabled: true, bevelThickness: bevel,
      bevelSize: bevel, bevelSegments: 3, curveSegments: 8
    });
    geo.translate(0, 0, -(d)/2 + bevel); geo.computeVertexNormals(); return geo;
  }

  function bodyMat(color){ return new THREE.MeshStandardMaterial({ color, roughness:0.9, metalness:0.0 }); }
  
  const matOrange = bodyMat(COLORS.orange);
  const matOrangeDk = bodyMat(COLORS.orangeDk);

  // ---------- textures ----------
  function makeFaceTexture(){
    const c = document.createElement('canvas');
    c.width = 512; c.height = 384;
    const ctx = c.getContext('2d');
    
    // Solid dark screen
    ctx.fillStyle = '#0B0C10'; 
    ctx.fillRect(0,0,c.width,c.height);

    // Glowing Cyan Eyes - Big Eyes, No Mouth
    function drawEye(cx, cy, w, h){
      ctx.save(); 
      ctx.beginPath();
      ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#2EE2FA'; 
      ctx.fill(); 
      ctx.restore();
    }
    
    drawEye(140, 192, 160, 220); 
    drawEye(372, 192, 160, 220);

    const tex = new THREE.CanvasTexture(c); 
    // Dynamic Anisotropy fetch prevents GPU texture crash on Mac/iOS
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy(); 
    tex.encoding = THREE.sRGBEncoding; 
    return tex;
  }

  function makeChestTexture(){
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    
    const pad = 24;
    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
    }

    // Purple Screen with thick black outline
    roundRect(ctx, pad, pad, c.width-pad*2, c.height-pad*2-70, 26);
    ctx.fillStyle = '#78288C'; ctx.fill();
    ctx.lineWidth = 14; 
    ctx.strokeStyle = '#000000'; 
    ctx.stroke();

    // Pink Heart with outline
    ctx.save(); 
    ctx.translate(256, 210); 
    ctx.scale(2.5,2.5);
    ctx.beginPath(); 
    ctx.moveTo(0, 18); 
    ctx.bezierCurveTo(-45,-20, -35,-55, 0,-25); 
    ctx.bezierCurveTo(35,-55, 45,-20, 0, 18); 
    ctx.closePath();
    ctx.fillStyle = '#FF5A5F'; ctx.fill(); 
    ctx.lineWidth = 4; 
    ctx.strokeStyle = '#000000';
    ctx.stroke();
    ctx.restore();

    // Text
    ctx.fillStyle = '#000000'; 
    ctx.font = '900 68px "Arial Black", sans-serif'; 
    ctx.textAlign = 'center'; 
    ctx.textBaseline = 'middle';
    ctx.fillText('AURA', 256, c.height-45); 

    const tex = new THREE.CanvasTexture(c); 
    tex.encoding = THREE.sRGBEncoding; 
    return tex;
  }

  function ribbedTube(length, radius, ribCount, colorMain, colorRib){
    const g = new THREE.Group();
    const core = new THREE.Mesh(new THREE.CylinderGeometry(radius*0.86, radius*0.86, length, 20, 1, true), bodyMat(colorMain));
    core.castShadow = true; core.receiveShadow = true; 
    addOutline(core, 0.05); 
    g.add(core);

    const ribW = length/ribCount;
    for(let i=0;i<ribCount;i++){
      const rib = new THREE.Mesh(new THREE.TorusGeometry(radius, radius*0.14, 10, 24), bodyMat(colorRib));
      rib.rotation.x = Math.PI/2; rib.position.y = -length/2 + ribW*(i+0.5); rib.castShadow = true; 
      addOutline(rib, 0.03); 
      g.add(rib);
    }
    return g;
  }

  // ---------- BONE RIG DEFINITION ----------
  const animBones = { armL: { shoulder: null, elbow: null }, armR: { shoulder: null, elbow: null }, legL: { hip: null, knee: null }, legR: { hip: null, knee: null }, torso: null, head: null };
  const robot = new THREE.Group();
  scene.add(robot);

  // -- Head --
  const head = new THREE.Group();
  head.position.set(0, 3.15, 0); animBones.head = head; robot.add(head);
  const headShell = new THREE.Mesh(roundedBoxGeometry(3.5, 2.55, 2.15, 0.4), matOrange);
  headShell.castShadow = true; headShell.receiveShadow = true; 
  addOutline(headShell, 0.07);
  head.add(headShell);
  
  const bezel = new THREE.Mesh(new THREE.BoxGeometry(3.05, 2.1, 0.12), matOrangeDk); 
  bezel.position.z = 1.05; 
  addOutline(bezel, 0.04);
  head.add(bezel);
  
  const facePlane = new THREE.Mesh(new THREE.PlaneGeometry(2.82, 1.9), new THREE.MeshStandardMaterial({ map: makeFaceTexture(), roughness:1.0, metalness:0.0, emissive:0x111111, emissiveIntensity:0.1 }));
  facePlane.position.z = 1.12; head.add(facePlane);

  function buildEar(sign){
    const ear = new THREE.Group(); ear.position.set(sign*1.95, 0.05, 0);
    const earOuter = new THREE.Mesh(new THREE.CylinderGeometry(0.62,0.62,0.28,28), matOrange); earOuter.rotation.z = Math.PI/2; earOuter.castShadow = true; 
    addOutline(earOuter, 0.05);
    ear.add(earOuter);
    
    const earRing = new THREE.Mesh(new THREE.TorusGeometry(0.4,0.07,10,28), matOrangeDk); earRing.rotation.y = Math.PI/2; earRing.position.x = sign*0.12; 
    addOutline(earRing, 0.03);
    ear.add(earRing);
    return ear;
  }
  head.add(buildEar(-1)); head.add(buildEar(1));  

  // -- Neck --
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.5,0.45,20), matOrangeDk); neck.position.set(0, 1.675, 0); neck.castShadow = true; 
  addOutline(neck, 0.04);
  robot.add(neck);

  // -- Torso --
  const torso = new THREE.Group(); torso.position.set(0, 0.2, 0); animBones.torso = torso; robot.add(torso);
  const torsoShell = new THREE.Mesh(roundedBoxGeometry(2.9, 2.65, 1.85, 0.32), matOrange); torsoShell.castShadow = true; torsoShell.receiveShadow = true; 
  addOutline(torsoShell, 0.07);
  torso.add(torsoShell);
  
  const chestPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.25, 2.25), new THREE.MeshStandardMaterial({ map: makeChestTexture(), transparent:true, roughness:1.0, metalness:0.0 }));
  chestPlane.position.set(0, 0.05, 0.96); torso.add(chestPlane);

  // -- Articulated Arms --
  function buildArm(sign){
    const shoulderJoint = new THREE.Group(); 
    shoulderJoint.position.set(sign*1.55, 0.775, 0);
    
    const shoulderGeo = new THREE.Mesh(new THREE.SphereGeometry(0.55,20,16), matOrange); 
    shoulderGeo.castShadow = true; 
    addOutline(shoulderGeo, 0.05);
    shoulderJoint.add(shoulderGeo);
    
    const upperArm = ribbedTube(1.3, 0.42, 3, COLORS.grey, COLORS.greyLt); 
    upperArm.position.set(0, -0.65, 0);
    shoulderJoint.add(upperArm);
    
    const elbowJoint = new THREE.Group(); 
    elbowJoint.position.set(0, -1.3, 0);
    shoulderJoint.add(elbowJoint);

    const lowerArm = ribbedTube(1.3, 0.38, 3, COLORS.grey, COLORS.greyLt); 
    lowerArm.position.set(0, -0.65, 0); 
    elbowJoint.add(lowerArm);

    const hand = new THREE.Group(); 
    hand.position.set(0, -1.4, 0);
    const cuff = new THREE.Mesh(new THREE.CylinderGeometry(0.44,0.44,0.22,20), matOrangeDk); 
    addOutline(cuff, 0.04);
    hand.add(cuff);
    
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.85,0.7,0.38), matOrange); 
    palm.position.y = -0.35; 
    palm.castShadow = true; 
    addOutline(palm, 0.05);
    hand.add(palm);
    
    elbowJoint.add(hand);

    const bones = { shoulder: shoulderJoint, elbow: elbowJoint };
    if (sign > 0) animBones.armR = bones; else animBones.armL = bones;
    return shoulderJoint;
  }
  torso.add(buildArm(1)); torso.add(buildArm(-1));

  // -- Articulated Legs --
  function buildLeg(sign){
    const hipJoint = new THREE.Group(); 
    hipJoint.position.set(sign*0.62, -1.15, 0);

    const thigh = ribbedTube(1.8, 0.38, 4, COLORS.grey, COLORS.greyLt); 
    thigh.position.y = -0.9; 
    hipJoint.add(thigh);

    const kneeJoint = new THREE.Group();
    kneeJoint.position.set(0, -1.8, 0); 
    hipJoint.add(kneeJoint);

    const kneeSphere = new THREE.Mesh(new THREE.SphereGeometry(0.48, 20, 16), matOrange);
    kneeSphere.castShadow = true;
    addOutline(kneeSphere, 0.05);
    kneeJoint.add(kneeSphere);

    const bootHeight = 1.7;
    const bootGeo = new THREE.CylinderGeometry(0.38, 0.8, bootHeight, 24);
    const boot = new THREE.Mesh(bootGeo, matOrange);
    boot.position.y = -bootHeight / 2 - 0.1; 
    boot.castShadow = true; 
    boot.receiveShadow = true;
    addOutline(boot, 0.06);
    kneeJoint.add(boot);

    const soleGeo = new THREE.CylinderGeometry(0.85, 0.85, 0.22, 24);
    const sole = new THREE.Mesh(soleGeo, matOrangeDk);
    sole.position.y = -bootHeight / 2 + 0.11; 
    sole.castShadow = true;
    addOutline(sole, 0.05);
    boot.add(sole);

    const rivetMat = bodyMat(COLORS.grey);
    const rivetGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
    
    const rivetTop = new THREE.Mesh(rivetGeo, rivetMat);
    rivetTop.rotation.z = Math.PI / 2;
    rivetTop.position.set(sign * 0.62, 0.15, 0.15); 
    addOutline(rivetTop, 0.03);
    boot.add(rivetTop);

    const rivetBottom = new THREE.Mesh(rivetGeo, rivetMat);
    rivetBottom.rotation.z = Math.PI / 2;
    rivetBottom.position.set(sign * 0.75, -0.4, 0.2); 
    addOutline(rivetBottom, 0.03);
    boot.add(rivetBottom);

    const bones = { hip: hipJoint, knee: kneeJoint };
    if (sign > 0) animBones.legR = bones; else animBones.legL = bones;
    return hipJoint;
  }
  robot.add(buildLeg(1)); robot.add(buildLeg(-1));
  robot.position.y = 0.3;

  // ---------- MOVEMENT & KEYBOARD LOGIC ----------
  const keys = { up: false, down: false, left: false, right: false };
  window.addEventListener('keydown', e => {
    if(e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
    if(e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if(e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
    if(e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  });

  // ---------- camera interaction ----------
  let isDown=false, lastX=0, lastY=0;
  let rotY = 0.35, rotX = 0.12, radius = 15;
  const target = new THREE.Vector3();

  renderer.domElement.addEventListener('pointerdown', e=>{ isDown=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('pointerup', ()=> isDown=false);
  window.addEventListener('pointermove', e=>{
    if(!isDown) return;
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    rotY -= dx*0.006;
    rotX = Math.max(-0.5, Math.min(0.7, rotX + dy*0.005));
    lastX = e.clientX; lastY = e.clientY;
  });
  renderer.domElement.addEventListener('wheel', e=>{
    radius = Math.max(7, Math.min(28, radius + e.deltaY*0.01));
  }, {passive:true});

  // ---------- render loop ----------
  let currentSpeed = 0, runCycle = 0, idleCycle = 0; 
  
  const walkSpeed = 0.45;
  const turnSpeed = 0.08;

  function animate(){
    requestAnimationFrame(animate);
    
    let moveDirection = 0;
    
    if (keys.left) robot.rotation.y += turnSpeed;
    if (keys.right) robot.rotation.y -= turnSpeed;
    if (keys.up) moveDirection = 1;
    if (keys.down) moveDirection = -1;

    let targetSpeed = 0;
    if (moveDirection !== 0) {
      targetSpeed = 1;
      robot.position.x += Math.sin(robot.rotation.y) * walkSpeed * moveDirection;
      robot.position.z += Math.cos(robot.rotation.y) * walkSpeed * moveDirection;
    }

    target.copy(robot.position);
    target.y += 1.5; 

    camera.position.x = target.x + radius*Math.sin(rotY)*Math.cos(rotX);
    camera.position.y = target.y + radius*Math.sin(rotX);
    camera.position.z = target.z + radius*Math.cos(rotY)*Math.cos(rotX);
    camera.lookAt(target);

    lightsGroup.position.set(robot.position.x, 0, robot.position.z);
    key.target.position.set(robot.position.x, robot.position.y, robot.position.z);
    key.target.updateMatrixWorld();

    rocksGroup.children.forEach(rock => {
      const dx = rock.position.x - robot.position.x;
      const dz = rock.position.z - robot.position.z;
      const distSq = dx*dx + dz*dz;
      if (distSq > 3000) { 
        const angle = Math.random() * Math.PI * 2;
        const newDist = 45 + Math.random() * 10;
        rock.position.x = robot.position.x + Math.cos(angle) * newDist;
        rock.position.z = robot.position.z + Math.sin(angle) * newDist;
      }
    });

    currentSpeed = THREE.MathUtils.lerp(currentSpeed, targetSpeed, 0.1);
    const animationDir = moveDirection !== 0 ? moveDirection : 1; 
    runCycle += currentSpeed * 0.3 * animationDir; 
    idleCycle += 0.02; 

    const idleBreathing = Math.sin(idleCycle) * 0.06;
    const idleArmSway = Math.sin(idleCycle * 0.8) * 0.03;
    const idleHeadBob = Math.sin(idleCycle * 1.2) * 0.02;
    const idleWeight = 1 - currentSpeed;

    const runSwing = Math.sin(runCycle);
    const runBounce = Math.abs(Math.cos(runCycle)) * 0.35;

    // --- ARMS ---
    animBones.armL.shoulder.rotation.z = THREE.MathUtils.lerp(-0.25 - idleArmSway, -0.2, currentSpeed);
    animBones.armR.shoulder.rotation.z = THREE.MathUtils.lerp(0.25 + idleArmSway, 0.2, currentSpeed);
    
    animBones.armL.shoulder.rotation.x = THREE.MathUtils.lerp(idleArmSway, -runSwing * 0.8, currentSpeed);
    animBones.armR.shoulder.rotation.x = THREE.MathUtils.lerp(-idleArmSway, runSwing * 0.8, currentSpeed);

    animBones.armL.elbow.rotation.x = THREE.MathUtils.lerp(-0.1, -0.6 - Math.max(0, -runSwing) * 0.6, currentSpeed);
    animBones.armR.elbow.rotation.x = THREE.MathUtils.lerp(-0.1, -0.6 - Math.max(0, runSwing) * 0.6, currentSpeed);

    // --- LEGS ---
    animBones.legL.hip.rotation.x = -runSwing * 0.9 * currentSpeed;
    animBones.legR.hip.rotation.x = runSwing * 0.9 * currentSpeed;

    animBones.legL.knee.rotation.x = THREE.MathUtils.lerp(0, Math.max(0, -runSwing) * 1.4, currentSpeed);
    animBones.legR.knee.rotation.x = THREE.MathUtils.lerp(0, Math.max(0, runSwing) * 1.4, currentSpeed);

    // --- BODY ---
    const leanAmount = moveDirection === -1 ? -0.1 : 0.2;
    animBones.torso.rotation.x = THREE.MathUtils.lerp(0, leanAmount, currentSpeed);
    animBones.head.rotation.x = THREE.MathUtils.lerp(idleHeadBob, -0.15, currentSpeed); 
    robot.position.y = 0.3 + (idleBreathing * idleWeight) + (runBounce * currentSpeed);

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
